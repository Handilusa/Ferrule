<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="favicon-grad" x1="0" y1="64" x2="64" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4b5563" />
      <stop offset="50%" stop-color="#d1d5db" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>

  <!-- Input stream 1 -->
  <path d="M 12 60 C 24 56, 16 40, 32 32" stroke="url(#favicon-grad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="4 6" />
  <!-- Input stream 2 -->
  <path d="M 4 52 C 8 40, 24 48, 32 32" stroke="url(#favicon-grad)" stroke-width="4" stroke-linecap="round" stroke-dasharray="4 6" />

  <!-- Output line -->
  <path d="M 32 32 L 52 12" stroke="url(#favicon-grad)" stroke-width="6" stroke-linecap="round" />

  <!-- Crystal Prism -->
  <polygon points="26,26 40,24 32,32" fill="url(#favicon-grad)" opacity="1" />
  <polygon points="24,40 26,26 32,32" fill="url(#favicon-grad)" opacity="0.85" />
  <polygon points="38,38 24,40 32,32" fill="url(#favicon-grad)" opacity="0.6" />
  <polygon points="40,24 38,38 32,32" fill="url(#favicon-grad)" opacity="0.4" />
  <line x1="24" y1="40" x2="40" y2="24" stroke="#ffffff" stroke-width="0.5" opacity="0.5" />
  <line x1="26" y1="26" x2="38" y2="38" stroke="#ffffff" stroke-width="0.5" opacity="0.3" />
</svg>
