name: Deploy Agent Registry Contract

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libusb-1.0-0-dev

      - name: Install Rust + targets + stellar-cli
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install stellar-cli

      - name: Build contract
        working-directory: contracts/agent-registry
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Deploy to testnet
        env:
          ORCHESTRATOR_SECRET: ${{ secrets.ORCHESTRATOR_PRIVATE_KEY }}
        run: |
          stellar keys add ORCHESTRATOR --secret-key "$ORCHESTRATOR_SECRET"
          CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/agent-registry/target/wasm32-unknown-unknown/release/agent_registry.wasm \
            --network testnet \
            --source ORCHESTRATOR)
          echo "CONTRACT_ID=$CONTRACT_ID"
          echo "✅ Registry deployed: $CONTRACT_ID"
