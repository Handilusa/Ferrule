name: Deploy Agent Registry Contract

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config libudev-dev libusb-1.0-0-dev

      - name: Install Rust + targets + stellar-cli
        run: |
          rustup target add wasm32-unknown-unknown
          cargo install stellar-cli

      - name: Build and Optimize contract
        working-directory: contracts/agent-registry
        run: |
          cargo build --target wasm32-unknown-unknown --release
          stellar contract optimize --wasm target/wasm32-unknown-unknown/release/agent_registry.wasm

      - name: Fund fresh account & Deploy
        run: |
          echo "Generating brand new account for deployment..."
          stellar keys generate fresh_deployer
          PUBKEY=$(stellar keys address fresh_deployer)
          echo "Funding new account with Friendbot: $PUBKEY"
          curl -s "https://friendbot.stellar.org/?addr=$PUBKEY" || true
          
          echo "Deploying optimized contract..."
          CONTRACT_ID=$(stellar contract deploy \
            --wasm contracts/agent-registry/target/wasm32-unknown-unknown/release/agent_registry.optimized.wasm \
            --network testnet \
            --source fresh_deployer)
            
          echo "CONTRACT_ID=$CONTRACT_ID"
          echo "✅ Registry deployed: $CONTRACT_ID"

      - name: Upload compiled WASM artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent_registry.optimized.wasm
          path: contracts/agent-registry/target/wasm32-unknown-unknown/release/agent_registry.optimized.wasm
